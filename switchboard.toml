[settings]
image_name = "switchboard-agent"
image_tag = "latest"
log_dir = ".switchboard/logs"
timezone = "system"

# ═══════════════════════════════════════════════════════════════════════
# BMAD IMPLEMENTATION WORKFLOW
# ═══════════════════════════════════════════════════════════════════════
#
# Flow: Architect → Dev Agents → Code Reviewer → Scrum Master
#
# Prerequisites: BMAD planning artifacts in _bmad-output/planning-artifacts/
#   - PRD.md, architecture.md, epics/, project-context.md
#
# Schedule rationale:
#   - SM runs hourly to detect sprint completion and update progress
#   - Architect runs every 2h to plan new sprints or rebalance
#   - Dev agents run every 30min to implement stories
#   - Reviewer runs every 45min to review completed work
#   - Staggered dev agent starts prevent git conflicts

[[agent]]
name = "cli-sprint-planner"
schedule = "5,35 * * * *"                 # Every 30 min at :05 and :35
readonly = false
timeout = "25m"
prompt_file = ".switchboard/workflows/bmad/prompts/SPRINT_PLANNER.md"
env = { AGENT_COUNT = "2" }

[[agent]]
name = "cli-dev-1"
schedule = "*/30 * * * *"                 # Every 30 min at :00 and :30
readonly = false
timeout = "30m"
prompt_file = ".switchboard/workflows/bmad/prompts/DEV_PARALLEL.md"
env = { AGENT_ID = "1" }

[[agent]]
name = "cli-dev-2"
schedule = "15,45 * * * *"               # Every 30 min at :15 and :45
readonly = false
timeout = "30m"
prompt_file = ".switchboard/workflows/bmad/prompts/DEV_PARALLEL.md"
env = { AGENT_ID = "2" }

[[agent]]
name = "cli-code-reviewer"
schedule = "20,50 * * * *"               # Every 30 min at :20 and :50
readonly = false
timeout = "20m"
prompt_file = ".switchboard/workflows/bmad/prompts/CODE_REVIEWER.md"

[[agent]]
name = "cli-scrum-master"
schedule = "0 * * * *"                    # Every hour on the hour
readonly = false
timeout = "15m"
prompt_file = ".switchboard/workflows/bmad/prompts/SCRUM_MASTER.md"
env = { AGENT_COUNT = "2" }